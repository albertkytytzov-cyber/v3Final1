name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup
        run: bash scripts/setup.sh

      - name: Lint and typecheck
        run: bash scripts/lint.sh

      - name: Test
        run: bash scripts/test.sh
