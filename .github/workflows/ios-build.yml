name: iOS Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-build.yml"
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-build.yml"

jobs:
  ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync iOS project
        run: npm run mobile:sync:ios

      - name: Resolve Xcode packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project apps/mobile/ios/App/App.xcodeproj \
            -scheme App

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project apps/mobile/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios-derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/ios-derived/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No iOS .app bundle was produced"
            exit 1
          fi

          rm -rf build/ios-unsigned
          mkdir -p build/ios-unsigned/Payload
          cp -R "$APP_PATH" build/ios-unsigned/Payload/
          (cd build/ios-unsigned && zip -qry ../perform-ios-unsigned.ipa Payload)

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: perform-ios-unsigned-ipa
          path: build/perform-ios-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Check signing secrets
        id: signing
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_EXPORT_TEAM_ID: ${{ secrets.IOS_EXPORT_TEAM_ID }}
        run: |
          if [ -n "$IOS_CERTIFICATE_P12_BASE64" ] && \
             [ -n "$IOS_CERTIFICATE_PASSWORD" ] && \
             [ -n "$IOS_PROVISIONING_PROFILE_BASE64" ] && \
             [ -n "$IOS_EXPORT_TEAM_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are not configured. Skipping signed IPA build."
          fi

      - name: Install signing assets
        id: signing-assets
        if: steps.signing.outputs.available == 'true'
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/ios_distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/perform.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/perform-profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo -n "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Archive signed app
        if: steps.signing.outputs.available == 'true'
        env:
          IOS_EXPORT_TEAM_ID: ${{ secrets.IOS_EXPORT_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          BUNDLE_ID="${IOS_BUNDLE_ID:-com.perform.training}"
          xcodebuild \
            -project apps/mobile/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/perform-ios.xcarchive \
            DEVELOPMENT_TEAM="$IOS_EXPORT_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.signing-assets.outputs.profile_name }}" \
            CODE_SIGNING_ALLOWED=YES \
            clean archive

      - name: Export signed IPA
        if: steps.signing.outputs.available == 'true'
        env:
          IOS_EXPORT_TEAM_ID: ${{ secrets.IOS_EXPORT_TEAM_ID }}
          IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          EXPORT_METHOD="${IOS_EXPORT_METHOD:-app-store}"
          BUNDLE_ID="${IOS_BUNDLE_ID:-com.perform.training}"

          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>teamID</key>
            <string>$IOS_EXPORT_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>${{ steps.signing-assets.outputs.profile_name }}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath build/perform-ios.xcarchive \
            -exportPath build/ios-signed \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload signed IPA artifact
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: perform-ios-signed-ipa
          path: build/ios-signed/*.ipa
          if-no-files-found: error
          retention-days: 14
