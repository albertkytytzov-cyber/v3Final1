services:
  postgres:
    image: postgres:16-alpine
    container_name: training-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-training_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-training_platform}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: training-platform-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_BIND_ADDRESS:-127.0.0.1}:${REDIS_PUBLISHED_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: training-platform-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-training_platform}
      REDIS_URL: redis://redis:6379
      PUBLIC_HOST: ${PUBLIC_HOST}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-training_platform_session}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      COACH_AI_REVIEW_MODE: ${COACH_AI_REVIEW_MODE:-server-rules}
      COACH_AI_REVIEW_MODEL: ${COACH_AI_REVIEW_MODEL:-}
      COACH_AI_REVIEW_ENDPOINT: ${COACH_AI_REVIEW_ENDPOINT:-https://api.openai.com/v1/responses}
      COACH_AI_REVIEW_INPUT_LIMIT: ${COACH_AI_REVIEW_INPUT_LIMIT:-20000}
      COACH_AI_REVIEW_TIMEOUT_MS: ${COACH_AI_REVIEW_TIMEOUT_MS:-8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PUBLISHED_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
        NEXT_PUBLIC_INTERNAL_MATRIX_CONSTRUCTOR_UI: ${NEXT_PUBLIC_INTERNAL_MATRIX_CONSTRUCTOR_UI:-false}
        NEXT_PUBLIC_MATRIX_CONSTRUCTOR_LIMITED_PRIMARY_PILOT: ${NEXT_PUBLIC_MATRIX_CONSTRUCTOR_LIMITED_PRIMARY_PILOT:-false}
    container_name: training-platform-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      NEXT_PUBLIC_INTERNAL_MATRIX_CONSTRUCTOR_UI: ${NEXT_PUBLIC_INTERNAL_MATRIX_CONSTRUCTOR_UI:-false}
      NEXT_PUBLIC_MATRIX_CONSTRUCTOR_LIMITED_PRIMARY_PILOT: ${NEXT_PUBLIC_MATRIX_CONSTRUCTOR_LIMITED_PRIMARY_PILOT:-false}
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PUBLISHED_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8

  worker:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: training-platform-worker
    restart: unless-stopped
    command: ["node", "apps/api/dist/runtime/worker.js"]
    environment:
      NODE_ENV: production
      WORKER_PORT: 4010
      WORKER_INTERVAL_MS: ${WORKER_INTERVAL_MS:-60000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-training_platform}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: training-platform-scheduler
    restart: unless-stopped
    command: ["node", "apps/api/dist/runtime/scheduler.js"]
    environment:
      NODE_ENV: production
      SCHEDULER_PORT: 4011
      SCHEDULER_INTERVAL_MS: ${SCHEDULER_INTERVAL_MS:-300000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-training_platform}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4011/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  reverse-proxy:
    image: caddy:2.9-alpine
    container_name: training-platform-proxy
    restart: unless-stopped
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2019/config/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
